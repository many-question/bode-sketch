<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bode-sketch - 传递函数可视化工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { appearance: textfield; -moz-appearance: textfield; }
        .plot-grid {
            background-image:
                linear-gradient(to right, #f1f5f9 1px, transparent 1px),
                linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
            background-size: 10% 20%;
        }
        .plot-svg text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .tap-target { touch-action: none; }
        #pzMap text {
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden font-sans">
    <header class="bg-white border-b border-slate-200 h-14 flex items-center px-4 shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" />
                </svg>
            </div>
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">bode-sketch</h1>
        </div>
        <div class="ml-auto hidden sm:flex items-center gap-4 text-sm">
            <span id="statusBadge" class="text-xs text-slate-500">连续时间 H(s) 教学可视化</span>
            <button id="resetExample" class="bg-blue-600 text-white px-3 py-1.5 rounded-md hover:bg-blue-700 transition-colors font-medium">重置示例</button>
        </div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <main class="flex-1 flex flex-col overflow-y-auto bg-slate-100 p-4 gap-4">
            <section class="bg-white border border-slate-200 rounded-lg shadow-sm flex flex-col min-h-[480px] flex-[2]">
                <div class="px-4 py-3 border-b border-slate-100 flex flex-col xl:flex-row xl:justify-between gap-3 shrink-0">
                    <div class="flex flex-wrap items-center gap-4">
                        <h2 class="font-medium text-slate-800">波特图 (Bode Plot)</h2>
                        <div class="flex bg-slate-100 p-1 rounded-md border border-slate-200">
                            <button id="modeExact" class="px-3 py-1 text-xs rounded font-medium">精确模式</button>
                            <button id="modeSketch" class="px-3 py-1 text-xs rounded font-medium">折线草绘</button>
                        </div>
                        <div id="contributionHint" class="hidden bg-blue-50 border border-blue-200 text-blue-700 px-3 py-1 rounded-full text-xs font-medium items-center gap-2">
                            <span id="contributionText"></span>
                            <button id="clearSelectionFromBode" class="hover:text-blue-900 bg-white rounded-full px-1">×</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 text-xs">
                        <div>
                            <label class="flex justify-between items-center gap-2 text-slate-700 font-medium">
                                <span>频率 rad/s</span>
                                <span class="font-normal text-slate-500"><input id="autoFreq" type="checkbox" class="align-middle" checked> 自动</span>
                            </label>
                            <div class="flex items-center gap-1 mt-1">
                                <input id="wMin" type="number" step="any" class="range-input w-20 border border-slate-200 rounded px-2 py-1">
                                <span class="text-slate-400">至</span>
                                <input id="wMax" type="number" step="any" class="range-input w-20 border border-slate-200 rounded px-2 py-1">
                            </div>
                        </div>
                        <div>
                            <label class="flex justify-between items-center gap-2 text-slate-700 font-medium">
                                <span>幅度 dB</span>
                                <span class="font-normal text-slate-500"><input id="autoMag" type="checkbox" class="align-middle" checked> 自动</span>
                            </label>
                            <div class="flex items-center gap-1 mt-1">
                                <input id="magMin" type="number" step="any" class="range-input w-20 border border-slate-200 rounded px-2 py-1">
                                <span class="text-slate-400">至</span>
                                <input id="magMax" type="number" step="any" class="range-input w-20 border border-slate-200 rounded px-2 py-1">
                            </div>
                        </div>
                        <div>
                            <label class="flex justify-between items-center gap-2 text-slate-700 font-medium">
                                <span>相位 °</span>
                                <span class="font-normal text-slate-500"><input id="autoPhase" type="checkbox" class="align-middle" checked> 自动</span>
                            </label>
                            <div class="flex items-center gap-1 mt-1">
                                <input id="phaseMin" type="number" step="any" class="range-input w-20 border border-slate-200 rounded px-2 py-1">
                                <span class="text-slate-400">至</span>
                                <input id="phaseMax" type="number" step="any" class="range-input w-20 border border-slate-200 rounded px-2 py-1">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="flex-1 p-4 flex flex-col gap-3">
                    <div class="flex-1 min-h-[180px] relative border border-slate-200 rounded bg-white plot-grid">
                        <svg id="magPlot" class="plot-svg absolute inset-0 w-full h-full" viewBox="0 0 800 240" preserveAspectRatio="none"></svg>
                    </div>
                    <div class="flex-1 min-h-[180px] relative border border-slate-200 rounded bg-white plot-grid">
                        <svg id="phasePlot" class="plot-svg absolute inset-0 w-full h-full" viewBox="0 0 800 240" preserveAspectRatio="none"></svg>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                <section class="bg-white border border-slate-200 rounded-lg shadow-sm flex flex-col min-h-[300px]">
                    <div class="px-4 py-2 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
                        <h2 class="font-medium text-slate-800 text-sm">冲激响应 (Impulse Response)</h2>
                        <div class="flex flex-wrap items-center gap-2 text-xs">
                            <label class="text-slate-500"><input id="autoTimeImpulse" type="checkbox" checked> 自动</label>
                            <input id="impulseTMin" type="number" step="any" class="time-input w-16 border border-slate-200 rounded px-2 py-1">
                            <span class="text-slate-400">至</span>
                            <input id="impulseTMax" type="number" step="any" class="time-input w-16 border border-slate-200 rounded px-2 py-1">
                            <input id="impulseYMin" type="number" step="any" class="time-input w-16 border border-slate-200 rounded px-2 py-1">
                            <span class="text-slate-400">至</span>
                            <input id="impulseYMax" type="number" step="any" class="time-input w-16 border border-slate-200 rounded px-2 py-1">
                        </div>
                    </div>
                    <div class="flex-1 p-4">
                        <div class="h-full min-h-[220px] relative border border-slate-200 rounded bg-white plot-grid">
                            <svg id="impulsePlot" class="plot-svg absolute inset-0 w-full h-full" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
                        </div>
                    </div>
                </section>

                <section class="bg-white border border-slate-200 rounded-lg shadow-sm flex flex-col min-h-[300px]">
                    <div class="px-4 py-2 border-b border-slate-100 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
                        <h2 class="font-medium text-slate-800 text-sm">阶跃响应 (Step Response)</h2>
                        <div class="flex flex-wrap items-center gap-2 text-xs">
                            <label class="text-slate-500"><input id="autoTimeStep" type="checkbox" checked> 自动</label>
                            <input id="stepTMin" type="number" step="any" class="time-input w-16 border border-slate-200 rounded px-2 py-1">
                            <span class="text-slate-400">至</span>
                            <input id="stepTMax" type="number" step="any" class="time-input w-16 border border-slate-200 rounded px-2 py-1">
                            <input id="stepYMin" type="number" step="any" class="time-input w-16 border border-slate-200 rounded px-2 py-1">
                            <span class="text-slate-400">至</span>
                            <input id="stepYMax" type="number" step="any" class="time-input w-16 border border-slate-200 rounded px-2 py-1">
                        </div>
                    </div>
                    <div class="flex-1 p-4">
                        <div class="h-full min-h-[220px] relative border border-slate-200 rounded bg-white plot-grid">
                            <svg id="stepPlot" class="plot-svg absolute inset-0 w-full h-full" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <aside class="w-full md:w-[420px] xl:w-[470px] bg-white border-l border-slate-200 flex flex-col shrink-0 overflow-y-auto">
            <section class="p-4 border-b border-slate-200 bg-slate-50 shrink-0">
                <h2 class="text-xs font-semibold text-slate-500 tracking-wider mb-2">传递函数 H(s)</h2>
                <div class="bg-white border border-slate-200 rounded p-3 overflow-x-auto shadow-inner">
                    <div id="hsExpression" class="text-sm font-mono leading-7 min-w-max tabular-nums"></div>
                </div>
                <p id="systemNotice" class="mt-2 text-xs text-slate-500"></p>
            </section>

            <section class="p-4 border-b border-slate-200 shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-semibold text-slate-500 tracking-wider">零极点图 (Pole-Zero Map)</h2>
                    <div class="flex items-center gap-3 text-xs">
                        <label class="flex items-center gap-1 text-slate-500 cursor-pointer">
                            <input id="pzLogScale" type="checkbox" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500" checked>
                            对数坐标
                        </label>
                        <div id="selectedToolbar" class="hidden flex items-center gap-2"></div>
                    </div>
                </div>
                <div class="aspect-square w-full max-w-[340px] mx-auto relative border border-slate-200 bg-slate-50 rounded-md overflow-hidden">
                    <svg id="pzMap" class="tap-target absolute inset-0 w-full h-full" viewBox="0 0 340 340"></svg>
                </div>
                <div id="selectedInfo" class="mt-3 text-xs text-slate-600 min-h-[1.25rem]"></div>
            </section>

            <section class="p-4 border-b border-slate-200 shrink-0">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">增益系数设置</h2>
                <div class="grid grid-cols-2 gap-3">
                    <label>
                        <span class="block text-xs text-slate-500 mb-1">参考频率 ω<sub>ref</sub> (rad/s)</span>
                        <input id="wRef" type="number" step="any" class="w-full border border-slate-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                    </label>
                    <label>
                        <span class="block text-xs text-slate-500 mb-1">目标增益 G<sub>ref</sub></span>
                        <div class="flex">
                            <input id="gRef" type="number" step="any" class="w-full border border-slate-300 rounded-l px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 z-10">
                            <select id="gainUnit" class="border border-l-0 border-slate-300 rounded-r bg-slate-50 px-2 py-1.5 text-sm focus:outline-none">
                                <option value="db-pos">dB20 (正)</option>
                                <option value="db-neg">dB20 (负)</option>
                                <option value="linear">Linear</option>
                            </select>
                        </div>
                    </label>
                </div>
            </section>

            <section class="p-4 border-b border-slate-200 shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-semibold text-slate-500 tracking-wider flex items-center gap-1">
                        <span class="w-3 h-3 rounded-full border-2 border-green-500 inline-block"></span>
                        零点 (Zeros) <span id="zeroCount" class="text-slate-400"></span>
                    </h2>
                    <button id="addZero" class="text-xs bg-green-50 text-green-600 border border-green-200 hover:bg-green-100 px-2 py-1 rounded flex items-center gap-1 transition-colors">添加</button>
                </div>
                <div id="zeroList" class="space-y-2"></div>
            </section>

            <section class="p-4 mb-8 shrink-0">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-semibold text-slate-500 tracking-wider flex items-center gap-1">
                        <span class="w-3 h-3 flex items-center justify-center text-red-500 font-bold text-lg leading-none mt-[-2px]">×</span>
                        极点 (Poles) <span id="poleCount" class="text-slate-400"></span>
                    </h2>
                    <button id="addPole" class="text-xs bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 px-2 py-1 rounded flex items-center gap-1 transition-colors">添加</button>
                </div>
                <div id="poleList" class="space-y-2"></div>
            </section>
        </aside>
    </div>

    <script>
        "use strict";

        const EPS = 1e-9;
        const PLOT = { left: 52, right: 18, top: 18, bottom: 36 };
        const state = {
            zeros: [],
            poles: [],
            selected: null,
            mode: "exact",
            pzLogScale: true,
            wRef: 1,
            gRef: 20,
            gainUnit: "db",
            ranges: {
                autoFreq: true, autoMag: true, autoPhase: true,
                wMin: 0.1, wMax: 1000, magMin: -60, magMax: 40, phaseMin: -180, phaseMax: 180,
                autoTimeImpulse: true, autoTimeStep: true,
                impulseTMin: 0, impulseTMax: 10, impulseYMin: -1, impulseYMax: 1,
                stepTMin: 0, stepTMax: 10, stepYMin: -1, stepYMax: 1
            },
            drag: null,
            pzDragMapper: null,
            nextId: 1
        };

        const $ = (id) => document.getElementById(id);

        function newEntry(kind, re, im) {
            return { id: `${kind}-${state.nextId++}`, kind, re, im: Math.abs(im || 0) };
        }

        function resetExample() {
            state.nextId = 1;
            state.zeros = [
                newEntry("zero", 10, 0),
                newEntry("zero", -1, 9.95)
            ];
            state.poles = [
                newEntry("pole", -5, 0),
                newEntry("pole", -5, 31.22)
            ];
            state.selected = { kind: "zero", id: state.zeros[1].id };
            state.mode = "exact";
            state.pzLogScale = true;
            state.wRef = 1;
            state.gRef = 20;
            state.gainUnit = "db-pos";
            Object.assign(state.ranges, {
                autoFreq: true, autoMag: true, autoPhase: true,
                autoTimeImpulse: true, autoTimeStep: true
            });
            render();
        }

        function c(re, im) { return { re, im }; }
        function cAdd(a, b) { return c(a.re + b.re, a.im + b.im); }
        function cSub(a, b) { return c(a.re - b.re, a.im - b.im); }
        function cMul(a, b) { return c(a.re * b.re - a.im * b.im, a.re * b.im + a.im * b.re); }
        function cDiv(a, b) {
            const d = b.re * b.re + b.im * b.im;
            return d < EPS ? c(NaN, NaN) : c((a.re * b.re + a.im * b.im) / d, (a.im * b.re - a.re * b.im) / d);
        }
        function cAbs(a) { return Math.hypot(a.re, a.im); }
        function cArg(a) { return Math.atan2(a.im, a.re); }
        function cExp(a) {
            const e = Math.exp(Math.max(-700, Math.min(700, a.re)));
            return c(e * Math.cos(a.im), e * Math.sin(a.im));
        }

        function allRoots(entries) {
            const roots = [];
            entries.forEach((entry) => {
                roots.push(c(entry.re, entry.im));
                if (entry.im > EPS) roots.push(c(entry.re, -entry.im));
            });
            return roots;
        }

        function factorValue(entry, w) {
            const s = c(0, w);
            if (entry.im > EPS) {
                return cMul(cSub(s, c(entry.re, entry.im)), cSub(s, c(entry.re, -entry.im)));
            }
            return cSub(s, c(entry.re, 0));
        }

        function productValue(entries, w) {
            return entries.reduce((acc, entry) => cMul(acc, factorValue(entry, w)), c(1, 0));
        }

        function targetGainSigned() {
            if (!Number.isFinite(state.gRef)) return 1;
            if (state.gainUnit === "linear") return state.gRef;
            const sign = state.gainUnit === "db-neg" ? -1 : 1;
            return sign * Math.pow(10, state.gRef / 20);
        }

        function gainK() {
            const w = Math.max(Math.abs(state.wRef), EPS);
            const num = cAbs(productValue(state.zeros, w));
            const den = cAbs(productValue(state.poles, w));
            if (!Number.isFinite(num) || !Number.isFinite(den) || num < EPS) return 1;
            return targetGainSigned() * den / num;
        }

        function hAt(w, entriesZeros = state.zeros, entriesPoles = state.poles, k = gainK()) {
            return cDiv(cMul(c(k, 0), productValue(entriesZeros, w)), productValue(entriesPoles, w));
        }

        function selectedEntry() {
            if (!state.selected) return null;
            const list = state.selected.kind === "zero" ? state.zeros : state.poles;
            return list.find((entry) => entry.id === state.selected.id) || null;
        }

        function entryLabel(kind, index, entry) {
            const prefix = kind === "zero" ? "Z" : "P";
            const start = 1 + indexEntries(kind).slice(0, index).reduce((sum, item) => sum + (item.im > EPS ? 2 : 1), 0);
            return entry.im > EPS ? `${prefix}${start}, ${prefix}${start + 1}` : `${prefix}${start}`;
        }

        function indexEntries(kind) {
            return kind === "zero" ? state.zeros : state.poles;
        }

        function characteristicFrequency(entry) {
            return Math.max(Math.hypot(entry.re, entry.im), EPS);
        }

        function qOf(entry) {
            const w0 = characteristicFrequency(entry);
            if (entry.im <= EPS) return null;
            if (Math.abs(entry.re) <= EPS) return Infinity;
            return w0 / (2 * Math.abs(entry.re));
        }

        function setFromW0Q(entry, w0Raw, qRaw) {
            const w0 = Number(w0Raw);
            const q = Number(qRaw);
            if (!(w0 > 0) || !(q > 0.5)) return false;
            const sign = entry.re >= 0 ? 1 : -1;
            const reAbs = w0 / (2 * q);
            const im = Math.sqrt(Math.max(0, w0 * w0 - reAbs * reAbs));
            entry.re = sign * reAbs;
            entry.im = im;
            return true;
        }

        function fmt(x, digits = 4) {
            if (!Number.isFinite(x)) return "∞";
            if (Math.abs(x) < 1e-10) return "0";
            const ax = Math.abs(x);
            if (ax >= 10000 || ax < 0.001) return x.toExponential(2);
            return Number(x.toFixed(digits)).toString();
        }

        function sTerm(power = "", kind = null) {
            const colorClass = kind === "zero" ? "text-green-600" : kind === "pole" ? "text-red-500" : "";
            return `<span class="${colorClass} font-semibold">s${power}</span>`;
        }

        function signedTerm(coef, suffix = "") {
            if (Math.abs(coef) < EPS) return "";
            const abs = fmt(Math.abs(coef), 3);
            return `${coef >= 0 ? " + " : " - "}${abs}${suffix}`;
        }

        function signedSTerm(coef, kind = null) {
            if (Math.abs(coef) < EPS) return "";
            const abs = fmt(Math.abs(coef), 3);
            return `${coef >= 0 ? " + " : " - "}${abs}${sTerm("", kind)}`;
        }

        function factorClass(kind, entry) {
            const selected = state.selected && state.selected.kind === kind && state.selected.id === entry.id;
            return selected ? "text-blue-600 font-semibold" : "text-slate-950";
        }

        function realFactor(kind, entry) {
            const selected = state.selected && state.selected.kind === kind && state.selected.id === entry.id;
            return `<span class="${factorClass(kind, entry)}">(${sTerm("", selected ? null : kind)}${signedTerm(-entry.re)})</span>`;
        }

        function pairFactor(kind, entry) {
            const a = -2 * entry.re;
            const b = entry.re * entry.re + entry.im * entry.im;
            const selected = state.selected && state.selected.kind === kind && state.selected.id === entry.id;
            const termKind = selected ? null : kind;
            return `<span class="${factorClass(kind, entry)}">(${sTerm("²", termKind)}${signedSTerm(a, termKind)}${signedTerm(b)})</span>`;
        }

        function expressionHtml() {
            const k = fmt(gainK(), 5);
            const num = state.zeros.map((entry) => entry.im > EPS ? pairFactor("zero", entry) : realFactor("zero", entry));
            const den = state.poles.map((entry) => entry.im > EPS ? pairFactor("pole", entry) : realFactor("pole", entry));
            const numerator = [`${k}`, ...num].join(" × ");
            const denominator = den.length ? den.join(" × ") : "1";
            return `
                <div class="inline-block text-center">
                    <div class="border-b border-slate-500 px-2 pb-1">${numerator || k}</div>
                    <div class="px-2 pt-1">${denominator}</div>
                </div>`;
        }

        function polyMultiply(a, b) {
            const out = Array(a.length + b.length - 1).fill(0);
            for (let i = 0; i < a.length; i++) {
                for (let j = 0; j < b.length; j++) out[i + j] += a[i] * b[j];
            }
            return out;
        }

        function polyFromEntries(entries) {
            return entries.reduce((poly, entry) => {
                if (entry.im > EPS) return polyMultiply(poly, [1, -2 * entry.re, entry.re * entry.re + entry.im * entry.im]);
                return polyMultiply(poly, [1, -entry.re]);
            }, [1]);
        }

        function polyEvalComplex(coeffs, z) {
            return coeffs.reduce((acc, coeff) => cAdd(cMul(acc, z), c(coeff, 0)), c(0, 0));
        }

        function polyDerivative(coeffs) {
            const n = coeffs.length - 1;
            return coeffs.slice(0, -1).map((coeff, i) => coeff * (n - i));
        }

        function logspace(min, max, n) {
            const a = Math.log10(min);
            const b = Math.log10(max);
            return Array.from({ length: n }, (_, i) => Math.pow(10, a + (b - a) * i / (n - 1)));
        }

        function unwrap(phases) {
            const out = [];
            let offset = 0;
            for (let i = 0; i < phases.length; i++) {
                if (i > 0) {
                    const delta = phases[i] + offset - out[i - 1];
                    if (delta > 180) offset -= 360;
                    if (delta < -180) offset += 360;
                }
                out.push(phases[i] + offset);
            }
            return out;
        }

        function bodeExact(freqs) {
            const k = gainK();
            const rawPhase = [];
            const mag = freqs.map((w) => {
                const h = hAt(w, state.zeros, state.poles, k);
                rawPhase.push(cArg(h) * 180 / Math.PI);
                const amp = cAbs(h);
                return 20 * Math.log10(Math.max(amp, 1e-18));
            });
            return { mag, phase: unwrap(rawPhase) };
        }

        function firstOrderSketchTerm(w, w0, sign, order) {
            if (w <= w0) return 0;
            return sign * order * 20 * Math.log10(w / w0);
        }

        function phaseSketchTerm(w, w0, sign, order) {
            const lo = w0 / 10;
            const hi = w0 * 10;
            if (w <= lo) return 0;
            if (w >= hi) return sign * order * 90;
            return sign * order * 45 * (1 + Math.log10(w / w0));
        }

        function bodeSketch(freqs, exact) {
            const w0 = freqs[0];
            const anchor = 20 * Math.log10(Math.max(cAbs(hAt(w0)), 1e-18));
            const startPhase = cArg(hAt(w0)) * 180 / Math.PI;
            const mag = [];
            const phase = [];
            freqs.forEach((w, i) => {
                let m = anchor;
                let p = startPhase;
                state.zeros.forEach((entry) => {
                    const wc = characteristicFrequency(entry);
                    const order = entry.im > EPS ? 2 : 1;
                    m += firstOrderSketchTerm(w, wc, 1, order);
                    p += phaseSketchTerm(w, wc, 1, order);
                    if (entry.im > EPS) {
                        const q = qOf(entry);
                        if (Number.isFinite(q) && q > 0.7) {
                            const bell = Math.exp(-Math.pow(Math.log10(w / wc) / 0.18, 2));
                            m -= 20 * Math.log10(q) * bell;
                        }
                    }
                });
                state.poles.forEach((entry) => {
                    const wc = characteristicFrequency(entry);
                    const order = entry.im > EPS ? 2 : 1;
                    m += firstOrderSketchTerm(w, wc, -1, order);
                    p += phaseSketchTerm(w, wc, -1, order);
                    if (entry.im > EPS) {
                        const q = qOf(entry);
                        if (Number.isFinite(q) && q > 0.7) {
                            const bell = Math.exp(-Math.pow(Math.log10(w / wc) / 0.18, 2));
                            m += 20 * Math.log10(q) * bell;
                        }
                    }
                });
                mag.push(Number.isFinite(m) ? m : exact.mag[i]);
                phase.push(Number.isFinite(p) ? p : exact.phase[i]);
            });
            return { mag, phase: unwrap(phase) };
        }

        function autoFrequencyRange() {
            const freqs = [...state.zeros, ...state.poles]
                .map(characteristicFrequency)
                .filter((w) => w > EPS);
            if (!freqs.length) return [0.1, 1000];
            return [Math.max(Math.min(...freqs) / 100, 1e-6), Math.max(...freqs) * 100];
        }

        function niceRange(values, step) {
            const finite = values.filter(Number.isFinite);
            if (!finite.length) return [-step, step];
            let min = Math.min(...finite);
            let max = Math.max(...finite);
            if (Math.abs(max - min) < EPS) {
                min -= step;
                max += step;
            }
            return [Math.floor(min / step) * step, Math.ceil(max / step) * step];
        }

        function validIncreasing(min, max) {
            return Number.isFinite(min) && Number.isFinite(max) && max > min;
        }

        function updateRangeInputs(bodeData) {
            const r = state.ranges;
            if (r.autoFreq) [r.wMin, r.wMax] = autoFrequencyRange();
            if (r.autoMag) [r.magMin, r.magMax] = niceRange(bodeData.mag, 10);
            if (r.autoPhase) [r.phaseMin, r.phaseMax] = niceRange(bodeData.phase, 10);
            ["wMin", "wMax", "magMin", "magMax", "phaseMin", "phaseMax"].forEach((id) => {
                $(id).value = fmt(r[id], 5);
                $(id).disabled = r[`auto${id[0].toUpperCase()}${id.slice(1).replace(/Min|Max/, "")}`];
            });
            $("wMin").disabled = $("wMax").disabled = r.autoFreq;
            $("magMin").disabled = $("magMax").disabled = r.autoMag;
            $("phaseMin").disabled = $("phaseMax").disabled = r.autoPhase;
            $("autoFreq").checked = r.autoFreq;
            $("autoMag").checked = r.autoMag;
            $("autoPhase").checked = r.autoPhase;
        }

        function svgEl(name, attrs = {}) {
            const el = document.createElementNS("http://www.w3.org/2000/svg", name);
            Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
            return el;
        }

        function linePath(points, xFn, yFn) {
            const finite = points.filter((p) => Number.isFinite(p.x) && Number.isFinite(p.y));
            return finite.map((p, i) => `${i === 0 ? "M" : "L"} ${xFn(p.x).toFixed(2)} ${yFn(p.y).toFixed(2)}`).join(" ");
        }

        function drawAxes(svg, width, height, xTicks, yTicks, xLabel, yLabel, xFn, yFn) {
            const plotW = width - PLOT.left - PLOT.right;
            const plotH = height - PLOT.top - PLOT.bottom;
            svg.appendChild(svgEl("rect", { x: PLOT.left, y: PLOT.top, width: plotW, height: plotH, fill: "white", opacity: "0.7" }));
            xTicks.forEach((tick) => {
                const x = xFn(tick);
                svg.appendChild(svgEl("line", { x1: x, x2: x, y1: PLOT.top, y2: height - PLOT.bottom, stroke: "#e2e8f0", "stroke-width": 1 }));
                const text = svgEl("text", { x, y: height - 12, "font-size": 11, fill: "#64748b", "text-anchor": "middle" });
                text.textContent = fmt(tick, 3);
                svg.appendChild(text);
            });
            yTicks.forEach((tick) => {
                const y = yFn(tick);
                svg.appendChild(svgEl("line", { x1: PLOT.left, x2: width - PLOT.right, y1: y, y2: y, stroke: "#e2e8f0", "stroke-width": 1 }));
                const text = svgEl("text", { x: PLOT.left - 8, y: y + 4, "font-size": 11, fill: "#64748b", "text-anchor": "end" });
                text.textContent = fmt(tick, 3);
                svg.appendChild(text);
            });
            svg.appendChild(svgEl("rect", { x: PLOT.left, y: PLOT.top, width: plotW, height: plotH, fill: "none", stroke: "#cbd5e1" }));
            const xl = svgEl("text", { x: width - PLOT.right, y: height - 4, "font-size": 11, fill: "#475569", "text-anchor": "end" });
            xl.textContent = xLabel;
            svg.appendChild(xl);
            const yl = svgEl("text", { x: 8, y: 14, "font-size": 11, fill: "#475569" });
            yl.textContent = yLabel;
            svg.appendChild(yl);
        }

        function ticksLinear(min, max, count = 5) {
            const step = (max - min) / Math.max(1, count - 1);
            return Array.from({ length: count }, (_, i) => min + step * i);
        }

        function ticksLog(min, max) {
            const a = Math.ceil(Math.log10(min));
            const b = Math.floor(Math.log10(max));
            const out = [];
            for (let p = a; p <= b; p++) out.push(Math.pow(10, p));
            if (!out.length) return [min, Math.sqrt(min * max), max];
            return out;
        }

        function drawSeries(svg, points, xFn, yFn, color, width = 2, opacity = 1, dash = "") {
            const path = svgEl("path", {
                d: linePath(points, xFn, yFn),
                fill: "none",
                stroke: color,
                "stroke-width": width,
                opacity,
                "stroke-linejoin": "round",
                "stroke-linecap": "round"
            });
            if (dash) path.setAttribute("stroke-dasharray", dash);
            svg.appendChild(path);
        }

        function drawBodePlot(svg, width, height, freqs, series, yMin, yMax, label) {
            svg.innerHTML = "";
            const xMin = state.ranges.wMin;
            const xMax = state.ranges.wMax;
            const logMin = Math.log10(xMin);
            const logMax = Math.log10(xMax);
            const xFn = (x) => PLOT.left + (Math.log10(x) - logMin) / (logMax - logMin) * (width - PLOT.left - PLOT.right);
            const yFn = (y) => PLOT.top + (yMax - y) / (yMax - yMin) * (height - PLOT.top - PLOT.bottom);
            drawAxes(svg, width, height, ticksLog(xMin, xMax), ticksLinear(yMin, yMax, 5), "ω rad/s", label, xFn, yFn);
            series.forEach((s) => drawSeries(svg, s.data.map((y, i) => ({ x: freqs[i], y })), xFn, yFn, s.color, s.width, s.opacity, s.dash));
        }

        function selectedContribution(freqs, full) {
            const entry = selectedEntry();
            if (!entry) return null;
            const zeroEntries = entry.kind === "zero" ? [entry] : [];
            const poleEntries = entry.kind === "pole" ? [entry] : [];
            const mag = [];
            const rawPhase = [];
            freqs.forEach((w) => {
                const h = hAt(w, zeroEntries, poleEntries, 1);
                mag.push(20 * Math.log10(Math.max(cAbs(h), 1e-18)));
                rawPhase.push(cArg(h) * 180 / Math.PI);
            });
            const phase = unwrap(rawPhase);
            const wc = characteristicFrequency(entry);
            const idx = freqs.reduce((best, w, i) => Math.abs(Math.log(w / wc)) < Math.abs(Math.log(freqs[best] / wc)) ? i : best, 0);
            const magOffset = full.mag[idx] - mag[idx];
            const phaseOffset = full.phase[idx] - phase[idx];
            return {
                mag: mag.map((v) => v + magOffset),
                phase: phase.map((v) => v + phaseOffset)
            };
        }

        function currentBode() {
            const r = state.ranges;
            if (r.autoFreq) [r.wMin, r.wMax] = autoFrequencyRange();
            if (!(r.wMin > 0) || !(r.wMax > r.wMin)) [r.wMin, r.wMax] = [0.1, 1000];
            const freqs = logspace(r.wMin, r.wMax, 260);
            const exact = bodeExact(freqs);
            const active = state.mode === "sketch" ? bodeSketch(freqs, exact) : exact;
            if (r.autoMag) [r.magMin, r.magMax] = niceRange([...exact.mag, ...active.mag], 10);
            if (r.autoPhase) [r.phaseMin, r.phaseMax] = niceRange([...exact.phase, ...active.phase], 10);
            if (!validIncreasing(r.magMin, r.magMax)) [r.magMin, r.magMax] = niceRange([...exact.mag, ...active.mag], 10);
            if (!validIncreasing(r.phaseMin, r.phaseMax)) [r.phaseMin, r.phaseMax] = niceRange([...exact.phase, ...active.phase], 10);
            return { freqs, exact, active };
        }

        function plotTimeResponse(kind) {
            const roots = allRoots(state.poles);
            const num = polyFromEntries(state.zeros).map((v) => v * gainK());
            const den = polyFromEntries(state.poles);
            const dden = polyDerivative(den);
            const isImproper = num.length >= den.length;
            const residues = roots.map((root) => cDiv(polyEvalComplex(num, root), polyEvalComplex(dden, root)));
            const stableRates = roots.filter((p) => p.re < -EPS).map((p) => -p.re);
            const growRates = roots.filter((p) => p.re > EPS).map((p) => p.re);
            const osc = roots.filter((p) => Math.abs(p.im) > EPS).map((p) => Math.abs(p.im));
            let tMax = 10;
            if (growRates.length) tMax = Math.min(20, Math.max(0.5, 4 / Math.max(...growRates)));
            else if (stableRates.length) tMax = Math.min(1000, Math.max(0.1, 8 / Math.min(...stableRates)));
            if (osc.length) tMax = Math.max(tMax, Math.min(1000, 4 * 2 * Math.PI / Math.min(...osc)));
            const n = 260;
            const t = Array.from({ length: n }, (_, i) => tMax * i / (n - 1));
            const impulse = t.map((ti) => {
                let sum = c(0, 0);
                roots.forEach((root, i) => {
                    sum = cAdd(sum, cMul(residues[i], cExp(c(root.re * ti, root.im * ti))));
                });
                return Number.isFinite(sum.re) ? sum.re : NaN;
            });
            const step = [];
            let acc = 0;
            for (let i = 0; i < t.length; i++) {
                if (i > 0) acc += 0.5 * (impulse[i] + impulse[i - 1]) * (t[i] - t[i - 1]);
                step.push(acc);
            }
            return { t, y: kind === "impulse" ? impulse : step, tMax, isImproper };
        }

        function updateTimeRanges(impulseData, stepData) {
            const r = state.ranges;
            if (r.autoTimeImpulse) {
                r.impulseTMin = 0;
                r.impulseTMax = impulseData.tMax;
                [r.impulseYMin, r.impulseYMax] = niceRange(impulseData.y, 1);
            }
            if (r.autoTimeStep) {
                r.stepTMin = 0;
                r.stepTMax = stepData.tMax;
                [r.stepYMin, r.stepYMax] = niceRange(stepData.y, 1);
            }
            if (!validIncreasing(r.impulseTMin, r.impulseTMax)) [r.impulseTMin, r.impulseTMax] = [0, impulseData.tMax];
            if (!validIncreasing(r.stepTMin, r.stepTMax)) [r.stepTMin, r.stepTMax] = [0, stepData.tMax];
            if (!validIncreasing(r.impulseYMin, r.impulseYMax)) [r.impulseYMin, r.impulseYMax] = niceRange(impulseData.y, 1);
            if (!validIncreasing(r.stepYMin, r.stepYMax)) [r.stepYMin, r.stepYMax] = niceRange(stepData.y, 1);
            ["impulseTMin", "impulseTMax", "impulseYMin", "impulseYMax", "stepTMin", "stepTMax", "stepYMin", "stepYMax"].forEach((id) => {
                $(id).value = fmt(r[id], 5);
            });
            $("impulseTMin").disabled = $("impulseTMax").disabled = $("impulseYMin").disabled = $("impulseYMax").disabled = r.autoTimeImpulse;
            $("stepTMin").disabled = $("stepTMax").disabled = $("stepYMin").disabled = $("stepYMax").disabled = r.autoTimeStep;
            $("autoTimeImpulse").checked = r.autoTimeImpulse;
            $("autoTimeStep").checked = r.autoTimeStep;
        }

        function drawTimePlot(svg, data, yMin, yMax, color, label) {
            svg.innerHTML = "";
            const width = Number(svg.viewBox.baseVal.width) || 700;
            const height = Number(svg.viewBox.baseVal.height) || 260;
            const tMin = label === "Impulse" ? state.ranges.impulseTMin : state.ranges.stepTMin;
            const tMax = label === "Impulse" ? state.ranges.impulseTMax : state.ranges.stepTMax;
            const xFn = (x) => PLOT.left + (x - tMin) / (tMax - tMin) * (width - PLOT.left - PLOT.right);
            const yFn = (y) => PLOT.top + (yMax - y) / (yMax - yMin) * (height - PLOT.top - PLOT.bottom);
            drawAxes(svg, width, height, ticksLinear(tMin, tMax, 5), ticksLinear(yMin, yMax, 5), "t s", label, xFn, yFn);
            if (yMin < 0 && yMax > 0) {
                const y0 = yFn(0);
                svg.appendChild(svgEl("line", { x1: PLOT.left, x2: width - PLOT.right, y1: y0, y2: y0, stroke: "#94a3b8", "stroke-dasharray": "4 4" }));
            }
            const points = data.t.map((x, i) => ({ x, y: data.y[i] })).filter((p) => p.x >= tMin && p.x <= tMax);
            drawSeries(svg, points, xFn, yFn, color, 2.2);
        }

        function renderLists() {
            renderList("zero", state.zeros, $("zeroList"));
            renderList("pole", state.poles, $("poleList"));
            $("zeroCount").textContent = `(${state.zeros.reduce((n, e) => n + (e.im > EPS ? 2 : 1), 0)})`;
            $("poleCount").textContent = `(${state.poles.reduce((n, e) => n + (e.im > EPS ? 2 : 1), 0)})`;
        }

        function renderList(kind, entries, root) {
            root.innerHTML = entries.map((entry, index) => {
                const selected = state.selected && state.selected.kind === kind && state.selected.id === entry.id;
                const color = kind === "zero" ? "green" : "red";
                const border = selected ? "border-blue-400 bg-blue-50 shadow-sm" : `border-slate-200 bg-white hover:border-${color}-300`;
                const label = entryLabel(kind, index, entry);
                const q = qOf(entry);
                return `
                    <div class="entry-card border ${border} rounded p-2 text-sm transition-colors cursor-pointer group" data-kind="${kind}" data-id="${entry.id}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-medium ${selected ? "text-blue-700 bg-blue-100" : "text-slate-700 bg-slate-100"} px-1.5 py-0.5 rounded">
                                ${label} ${entry.im > EPS ? "(复共轭)" : "(实)"}
                            </span>
                            <div class="flex items-center gap-1.5 ${selected ? "" : "opacity-0 group-hover:opacity-100"} transition-opacity">
                                <button class="convert-btn text-[10px] ${selected ? "text-blue-600 border-blue-300" : "text-slate-500 border-slate-300"} hover:text-slate-900 border rounded px-1.5 py-0.5" data-kind="${kind}" data-id="${entry.id}">
                                    ${entry.im > EPS ? "转实数" : "转共轭"}
                                </button>
                                <button class="delete-btn text-slate-400 hover:text-red-500 transition-colors text-lg leading-none" data-kind="${kind}" data-id="${entry.id}">×</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            ${inputCell("Re", "re", entry.re, kind, entry.id, false, selected)}
                            ${inputCell(entry.im > EPS ? "±Im" : "Im", "im", entry.im, kind, entry.id, false, selected)}
                            ${inputCell("ω₀", "w0", characteristicFrequency(entry), kind, entry.id, false, selected)}
                            ${inputCell("Q", "q", entry.im > EPS ? (Number.isFinite(q) ? q : "∞") : "-", kind, entry.id, entry.im <= EPS || !Number.isFinite(q), selected)}
                        </div>
                    </div>`;
            }).join("");
        }

        function inputCell(label, field, value, kind, id, disabled, selected) {
            const cls = selected ? "border-blue-200 bg-white" : "border-slate-200 bg-white";
            const labelCls = selected ? "bg-blue-50 text-blue-600 border-blue-200" : "bg-slate-50 text-slate-500 border-slate-200";
            return `
                <label class="flex items-center border ${cls} rounded overflow-hidden ${disabled ? "opacity-60" : ""}">
                    <span class="${labelCls} text-xs px-2 py-1 border-r w-10 text-center">${label}</span>
                    <input type="${disabled ? "text" : "number"}" step="any" value="${typeof value === "number" ? fmt(value, 5) : value}" ${disabled ? "disabled" : ""}
                        data-kind="${kind}" data-id="${id}" data-field="${field}"
                        class="entry-input w-full px-2 py-1 bg-transparent focus:outline-none text-right ${selected ? "text-blue-900" : "text-slate-800"}">
                </label>`;
        }

        function pzLog(value) {
            if (Math.abs(value) < EPS) return 0;
            return Math.sign(value) * Math.log10(1 + Math.abs(value));
        }

        function pzInvLog(value) {
            if (Math.abs(value) < EPS) return 0;
            return Math.sign(value) * (Math.pow(10, Math.abs(value)) - 1);
        }

        function pzMaxMagnitude() {
            const magnitudes = [...state.zeros, ...state.poles].flatMap((entry) => [
                Math.abs(entry.re),
                Math.abs(entry.im),
                characteristicFrequency(entry)
            ]).filter((value) => Number.isFinite(value) && value > EPS);
            return magnitudes.length ? Math.max(...magnitudes) : 1;
        }

        function pzMinMagnitude() {
            const magnitudes = [...state.zeros, ...state.poles].flatMap((entry) => [
                Math.abs(entry.re),
                Math.abs(entry.im),
                characteristicFrequency(entry)
            ]).filter((value) => Number.isFinite(value) && value > EPS);
            return magnitudes.length ? Math.max(Math.min(...magnitudes), EPS) : 1;
        }

        function pzAxisConfig() {
            const maxMagnitude = pzMaxMagnitude();
            if (!state.pzLogScale) {
                const labelPower = Math.floor(Math.log10(maxMagnitude));
                const scale = Math.pow(10, labelPower);
                const normalizedMax = maxMagnitude / scale;
                const normalizedLimit = Math.max(0.5, Math.ceil(normalizedMax));
                const tickStep = normalizedLimit < 5 ? 0.5 : 1;
                const ticks = [];
                for (let value = tickStep; value <= normalizedLimit + EPS; value += tickStep) {
                    ticks.push(value * scale);
                }
                return {
                    scale: "linear",
                    ticks,
                    labelPower,
                    units: normalizedLimit * scale
                };
            }
            const minMagnitude = pzMinMagnitude();
            let minExponent = Math.floor(Math.log10(minMagnitude));
            let maxExponent = Math.ceil(Math.log10(maxMagnitude));
            if (maxExponent === minExponent) {
                minExponent -= 2;
                maxExponent += 2;
            }
            const ticks = Array.from({ length: 5 }, (_, index) => {
                const exponent = minExponent + (maxExponent - minExponent) * index / 4;
                return Math.pow(10, exponent);
            });
            const maxPower = ticks[ticks.length - 1];
            return {
                scale: "log",
                maxPower,
                ticks,
                units: pzLog(maxPower) * 1.12
            };
        }

        function pzMapper() {
            const size = 340;
            const center = size / 2;
            const half = size * 0.42;
            const config = pzAxisConfig();
            const toUnit = (value) => config.scale === "log" ? pzLog(value) : value;
            const fromUnit = (value) => config.scale === "log" ? pzInvLog(value) : value;
            const toScreen = (value) => toUnit(value) / config.units * half;
            const fromScreen = (value) => fromUnit(value / half * config.units);
            return {
                size,
                center,
                half,
                config,
                xFn: (x) => center + toScreen(x),
                yFn: (y) => center - toScreen(y),
                reFromX: (x) => fromScreen(x - center),
                imFromY: (y) => fromScreen(center - y)
            };
        }

        function renderPzMap() {
            const svg = $("pzMap");
            svg.innerHTML = "";
            const mapper = state.pzDragMapper || pzMapper();
            const { size, center } = mapper;
            svg.appendChild(svgEl("rect", { x: 0, y: 0, width: size / 2, height: size, fill: "#dbeafe", opacity: 0.25 }));
            drawPzGrid(svg, mapper);
            svg.appendChild(svgEl("line", { x1: center, x2: center, y1: 0, y2: size, stroke: "#94a3b8", "stroke-width": 1.4 }));
            svg.appendChild(svgEl("line", { x1: 0, x2: size, y1: center, y2: center, stroke: "#94a3b8", "stroke-width": 1.4 }));
            appendPzAxisLabel(svg, size - 44, center - 8, "Re", mapper.config);
            appendPzAxisLabel(svg, center + 8, 18, "Im", mapper.config);
            drawSelectedPzOverlay(svg, mapper);
            drawPzEntries(svg, state.zeros, "zero", mapper.xFn, mapper.yFn);
            drawPzEntries(svg, state.poles, "pole", mapper.xFn, mapper.yFn);
        }

        function drawPzGrid(svg, mapper) {
            const { size, center, config, xFn, yFn } = mapper;
            config.ticks.forEach((tick) => {
                [-1, 1].forEach((sign) => {
                    const value = sign * tick;
                    const x = xFn(value);
                    const y = yFn(value);
                    svg.appendChild(svgEl("line", { x1: x, x2: x, y1: 0, y2: size, stroke: "#e2e8f0", "stroke-width": 1 }));
                    svg.appendChild(svgEl("line", { x1: 0, x2: size, y1: y, y2: y, stroke: "#e2e8f0", "stroke-width": 1 }));
                    svg.appendChild(svgEl("line", { x1: x, x2: x, y1: center - 4, y2: center + 4, stroke: "#64748b", "stroke-width": 1 }));
                    svg.appendChild(svgEl("line", { x1: center - 4, x2: center + 4, y1: y, y2: y, stroke: "#64748b", "stroke-width": 1 }));
                    appendPzTickLabel(svg, x, center + 16, tick, sign, "middle", config);
                    appendPzTickLabel(svg, center + 7, y + 3, tick, sign, "start", config);
                });
            });
        }

        function appendPzTickLabel(svg, x, y, tick, sign, anchor, config) {
            const text = svgEl("text", {
                x,
                y,
                "font-size": 9,
                fill: "#64748b",
                "text-anchor": anchor
            });
            if (config.scale !== "log") {
                const normalized = tick / Math.pow(10, config.labelPower);
                text.textContent = fmt(sign * normalized, 3);
                svg.appendChild(text);
                return;
            }
            const exponent = Math.log10(tick);
            const exponentText = Math.abs(exponent - Math.round(exponent)) < 1e-6
                ? Math.round(exponent).toString()
                : fmt(exponent, 2);
            if (sign < 0) {
                const minus = svgEl("tspan");
                minus.textContent = "-";
                text.appendChild(minus);
            }
            if (exponent === 0) {
                const one = svgEl("tspan");
                one.textContent = "1";
                text.appendChild(one);
            } else {
                const base = svgEl("tspan");
                base.textContent = "10";
                text.appendChild(base);
                if (Math.abs(exponent - 1) > 1e-6) {
                    const exp = svgEl("tspan", { "baseline-shift": "super", "font-size": 7 });
                    exp.textContent = exponentText;
                    text.appendChild(exp);
                }
            }
            svg.appendChild(text);
        }

        function appendPzAxisLabel(svg, x, y, axisName, config) {
            const text = svgEl("text", { x, y, "font-size": 11, fill: "#64748b" });
            const axis = svgEl("tspan");
            axis.textContent = axisName;
            text.appendChild(axis);
            if (config.scale === "linear") {
                const multiplier = svgEl("tspan");
                multiplier.textContent = " ×10";
                text.appendChild(multiplier);
                const exponent = svgEl("tspan", { "baseline-shift": "super", "font-size": 8 });
                exponent.textContent = config.labelPower;
                text.appendChild(exponent);
            }
            svg.appendChild(text);
        }

        function pzPointPath(points, mapper) {
            return points.map((point, index) => {
                const x = mapper.xFn(point.re);
                const y = mapper.yFn(point.im);
                return `${index === 0 ? "M" : "L"} ${x.toFixed(2)} ${y.toFixed(2)}`;
            }).join(" ");
        }

        function drawSelectedPzOverlay(svg, mapper) {
            const entry = selectedEntry();
            if (!entry) return;
            const { center, config, xFn, yFn } = mapper;
            const w0 = characteristicFrequency(entry);
            const radius = Math.abs(yFn(w0) - center);
            const side = entry.re >= 0 ? 1 : -1;
            const arcPath = config.scale === "log"
                ? sampledPzCirclePath(w0, side, mapper)
                : linearPzCirclePath(center, radius, side);
            const arc = svgEl("path", {
                d: arcPath,
                fill: "none",
                stroke: "#2563eb",
                "stroke-width": 1.5,
                "stroke-dasharray": "5 4",
                opacity: 0.75
            });
            svg.appendChild(arc);
            const w0Label = svgEl("text", {
                x: center + (side >= 0 ? -8 : 8),
                y: center - radius - 5,
                "font-size": 10,
                fill: "#2563eb",
                "text-anchor": side >= 0 ? "end" : "start"
            });
            w0Label.textContent = `ω₀=${fmt(w0, 3)}`;
            svg.appendChild(w0Label);
            if (entry.im <= EPS) return;
            [entry.im, -entry.im].forEach((im) => {
                const x = xFn(entry.re);
                const y = yFn(im);
                const radialPath = config.scale === "log"
                    ? sampledPzRadialPath(entry.re, im, mapper)
                    : `M ${center} ${center} L ${x} ${y}`;
                svg.appendChild(svgEl("path", {
                    d: radialPath,
                    fill: "none",
                    stroke: "#2563eb",
                    "stroke-width": 1.2,
                    opacity: 0.65
                }));
            });
            const positiveAngle = Math.abs(Math.atan2(Math.abs(entry.im), entry.re) * 180 / Math.PI);
            const angleLabel = svgEl("text", {
                x: center + (side >= 0 ? -16 : 16),
                y: center - 9,
                "font-size": 10,
                fill: "#2563eb",
                "text-anchor": side >= 0 ? "end" : "start"
            });
            angleLabel.textContent = `∠${fmt(positiveAngle, 1)}°`;
            svg.appendChild(angleLabel);
        }

        function linearPzCirclePath(center, radius, side) {
            const sweep = side >= 0 ? 1 : 0;
            return `M ${center} ${center - radius} A ${radius} ${radius} 0 0 ${sweep} ${center} ${center + radius}`;
        }

        function sampledPzCirclePath(w0, side, mapper) {
            const start = side >= 0 ? -Math.PI / 2 : Math.PI / 2;
            const end = side >= 0 ? Math.PI / 2 : 3 * Math.PI / 2;
            const points = Array.from({ length: 81 }, (_, index) => {
                const theta = start + (end - start) * index / 80;
                return { re: w0 * Math.cos(theta), im: w0 * Math.sin(theta) };
            });
            return pzPointPath(points, mapper);
        }

        function sampledPzRadialPath(re, im, mapper) {
            const points = Array.from({ length: 41 }, (_, index) => {
                const ratio = index / 40;
                return { re: re * ratio, im: im * ratio };
            });
            return pzPointPath(points, mapper);
        }

        function drawPzEntries(svg, entries, kind, xFn, yFn) {
            entries.forEach((entry) => {
                const selected = state.selected && state.selected.kind === kind && state.selected.id === entry.id;
                const points = entry.im > EPS ? [entry.im, -entry.im] : [0];
                points.forEach((im, pointIndex) => {
                    const g = svgEl("g", {
                        class: "pz-marker",
                        "data-kind": kind,
                        "data-id": entry.id,
                        "data-point": pointIndex,
                        transform: `translate(${xFn(entry.re)}, ${yFn(im)})`,
                        cursor: "grab"
                    });
                    g.appendChild(svgEl("circle", { r: 13, fill: "transparent", stroke: "none", "pointer-events": "all" }));
                    if (selected) {
                        g.appendChild(svgEl("circle", { r: 15, fill: "#60a5fa", opacity: 0.2 }));
                    }
                    if (kind === "zero") {
                        g.appendChild(svgEl("circle", { r: 6, fill: "none", stroke: selected ? "#2563eb" : "#22c55e", "stroke-width": 3 }));
                    } else {
                        g.appendChild(svgEl("line", { x1: -7, y1: -7, x2: 7, y2: 7, stroke: selected ? "#2563eb" : "#ef4444", "stroke-width": 3, "stroke-linecap": "round" }));
                        g.appendChild(svgEl("line", { x1: -7, y1: 7, x2: 7, y2: -7, stroke: selected ? "#2563eb" : "#ef4444", "stroke-width": 3, "stroke-linecap": "round" }));
                    }
                    svg.appendChild(g);
                });
            });
        }

        function renderSelectedPanel() {
            const entry = selectedEntry();
            const toolbar = $("selectedToolbar");
            if (!entry) {
                toolbar.classList.add("hidden");
                $("selectedInfo").textContent = "点击列表或零极点图可选中对象；拖动图中对象可修改位置。";
                return;
            }
            const q = qOf(entry);
            const label = entryLabel(entry.kind, indexEntries(entry.kind).indexOf(entry), entry);
            toolbar.classList.remove("hidden");
            toolbar.innerHTML = `
                <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">${label}</span>
                <button id="selectedConvert" class="text-slate-500 hover:text-slate-800 border border-slate-300 rounded px-2 py-0.5">${entry.im > EPS ? "转实数" : "转共轭"}</button>
                <button id="selectedDelete" class="text-red-500 hover:text-red-700 border border-red-200 rounded px-2 py-0.5">删除</button>`;
            $("selectedInfo").textContent = `${entry.kind === "zero" ? "零点" : "极点"} ${label}: Re=${fmt(entry.re)}, Im=${entry.im > EPS ? "±" + fmt(entry.im) : "0"}, ω₀=${fmt(characteristicFrequency(entry))}, Q=${entry.im > EPS ? fmt(q) : "不适用"}`;
            $("selectedConvert").onclick = () => convertEntry(entry.kind, entry.id);
            $("selectedDelete").onclick = () => deleteEntry(entry.kind, entry.id);
        }

        function renderInputs() {
            $("hsExpression").innerHTML = expressionHtml();
            $("wRef").value = fmt(state.wRef, 5);
            $("gRef").value = fmt(state.gRef, 5);
            $("gainUnit").value = state.gainUnit;
            $("pzLogScale").checked = state.pzLogScale;
            $("modeExact").className = state.mode === "exact"
                ? "px-3 py-1 text-xs rounded bg-white shadow-sm font-medium text-slate-800"
                : "px-3 py-1 text-xs rounded font-medium text-slate-500 hover:text-slate-700";
            $("modeSketch").className = state.mode === "sketch"
                ? "px-3 py-1 text-xs rounded bg-white shadow-sm font-medium text-slate-800"
                : "px-3 py-1 text-xs rounded font-medium text-slate-500 hover:text-slate-700";
            renderLists();
            renderSelectedPanel();
            renderPzMap();
        }

        function systemWarnings(extra = "") {
            const warnings = [];
            if (state.poles.some((p) => p.re > EPS)) warnings.push("系统含右半平面极点，响应不稳定。");
            if (state.poles.some((p) => Math.abs(p.re) <= EPS)) warnings.push("系统含虚轴或原点极点，响应可能不衰减。");
            if (extra) warnings.push(extra);
            $("systemNotice").textContent = warnings.join(" ");
            $("systemNotice").className = warnings.length ? "mt-2 text-xs text-amber-600" : "mt-2 text-xs text-slate-500";
            if (!warnings.length) $("systemNotice").textContent = "所有视图会随零极点、增益和范围设置实时更新。";
        }

        function renderPlots() {
            const bode = currentBode();
            updateRangeInputs(bode.active);
            const selected = selectedEntry();
            const contribution = selectedContribution(bode.freqs, bode.exact);
            $("contributionHint").classList.toggle("hidden", !selected);
            $("contributionHint").classList.toggle("flex", !!selected);
            if (selected) {
                const label = entryLabel(selected.kind, indexEntries(selected.kind).indexOf(selected), selected);
                $("contributionText").textContent = `展示选中对象贡献 (${label})`;
            }
            const magSeries = [];
            const phaseSeries = [];
            if (selected && contribution) {
                magSeries.push({ data: bode.exact.mag, color: "#94a3b8", width: 2, opacity: 0.45 });
                phaseSeries.push({ data: bode.exact.phase, color: "#94a3b8", width: 2, opacity: 0.45 });
                magSeries.push({ data: contribution.mag, color: "#2563eb", width: 3, opacity: 1 });
                phaseSeries.push({ data: contribution.phase, color: "#ea580c", width: 3, opacity: 1 });
            } else if (state.mode === "sketch") {
                magSeries.push({ data: bode.exact.mag, color: "#94a3b8", width: 2, opacity: 0.4 });
                phaseSeries.push({ data: bode.exact.phase, color: "#94a3b8", width: 2, opacity: 0.4 });
                magSeries.push({ data: bode.active.mag, color: "#2563eb", width: 3, opacity: 1, dash: "8 5" });
                phaseSeries.push({ data: bode.active.phase, color: "#ea580c", width: 3, opacity: 1, dash: "8 5" });
            } else {
                magSeries.push({ data: bode.active.mag, color: "#2563eb", width: 2.5, opacity: 1 });
                phaseSeries.push({ data: bode.active.phase, color: "#ea580c", width: 2.5, opacity: 1 });
            }
            drawBodePlot($("magPlot"), 800, 240, bode.freqs, magSeries, state.ranges.magMin, state.ranges.magMax, "Magnitude dB");
            drawBodePlot($("phasePlot"), 800, 240, bode.freqs, phaseSeries, state.ranges.phaseMin, state.ranges.phaseMax, "Phase deg");

            const impulse = plotTimeResponse("impulse");
            const step = plotTimeResponse("step");
            updateTimeRanges(impulse, step);
            drawTimePlot($("impulsePlot"), impulse, state.ranges.impulseYMin, state.ranges.impulseYMax, "#10b981", "Impulse");
            drawTimePlot($("stepPlot"), step, state.ranges.stepYMin, state.ranges.stepYMax, "#8b5cf6", "Step");
            systemWarnings(impulse.isImproper ? "当前传递函数非严格真有理，时域图忽略瞬时冲激项。" : "");
        }

        function render() {
            renderInputs();
            renderPlots();
        }

        function addEntry(kind) {
            const list = kind === "zero" ? state.zeros : state.poles;
            const entry = newEntry(kind, kind === "zero" ? -10 : -1, 0);
            list.push(entry);
            state.selected = { kind, id: entry.id };
            render();
        }

        function deleteEntry(kind, id) {
            const list = kind === "zero" ? state.zeros : state.poles;
            const index = list.findIndex((entry) => entry.id === id);
            if (index >= 0) list.splice(index, 1);
            if (state.selected && state.selected.kind === kind && state.selected.id === id) state.selected = null;
            render();
        }

        function convertEntry(kind, id) {
            const list = kind === "zero" ? state.zeros : state.poles;
            const entry = list.find((item) => item.id === id);
            if (!entry) return;
            if (entry.im > EPS) {
                entry.im = 0;
            } else {
                const w0 = Math.max(Math.abs(entry.re), 1);
                const q = 2;
                const sign = entry.re >= 0 ? 1 : -1;
                entry.re = sign * w0 / (2 * q);
                entry.im = Math.sqrt(Math.max(0, w0 * w0 - entry.re * entry.re));
            }
            state.selected = { kind, id };
            render();
        }

        function updateEntryField(kind, id, field, value) {
            const list = kind === "zero" ? state.zeros : state.poles;
            const entry = list.find((item) => item.id === id);
            if (!entry) return;
            const num = Number(value);
            if (field !== "q" && !Number.isFinite(num)) return;
            if (field === "re") entry.re = num;
            if (field === "im") entry.im = Math.abs(num);
            if (field === "w0") {
                if (!(num >= 0)) return;
                if (entry.im > EPS) {
                    const q = qOf(entry);
                    if (Number.isFinite(q)) setFromW0Q(entry, Math.max(num, EPS), q);
                } else {
                    const sign = entry.re >= 0 ? 1 : -1;
                    entry.re = sign * Math.max(num, 0);
                }
            }
            if (field === "q") setFromW0Q(entry, characteristicFrequency(entry), value);
            state.selected = { kind, id };
            render();
        }

        function pointerToPz(evt) {
            const svg = $("pzMap");
            const rect = svg.getBoundingClientRect();
            const x = (evt.clientX - rect.left) / rect.width * 340;
            const y = (evt.clientY - rect.top) / rect.height * 340;
            const mapper = state.pzDragMapper || pzMapper();
            return {
                re: mapper.reFromX(x),
                im: mapper.imFromY(y)
            };
        }

        function bindEvents() {
            $("resetExample").addEventListener("click", resetExample);
            $("modeExact").addEventListener("click", () => { state.mode = "exact"; render(); });
            $("modeSketch").addEventListener("click", () => { state.mode = "sketch"; render(); });
            $("clearSelectionFromBode").addEventListener("click", () => { state.selected = null; render(); });
            $("pzLogScale").addEventListener("change", (e) => { state.pzLogScale = e.target.checked; render(); });
            $("addZero").addEventListener("click", () => addEntry("zero"));
            $("addPole").addEventListener("click", () => addEntry("pole"));
            $("wRef").addEventListener("change", (e) => { const v = Number(e.target.value); if (v > 0) state.wRef = v; render(); });
            $("gRef").addEventListener("change", (e) => { const v = Number(e.target.value); if (Number.isFinite(v)) state.gRef = v; render(); });
            $("gainUnit").addEventListener("change", (e) => { state.gainUnit = e.target.value; render(); });
            ["autoFreq", "autoMag", "autoPhase", "autoTimeImpulse", "autoTimeStep"].forEach((id) => {
                $(id).addEventListener("change", (e) => {
                    state.ranges[id] = e.target.checked;
                    render();
                });
            });
            ["wMin", "wMax", "magMin", "magMax", "phaseMin", "phaseMax", "impulseTMin", "impulseTMax", "impulseYMin", "impulseYMax", "stepTMin", "stepTMax", "stepYMin", "stepYMax"].forEach((id) => {
                $(id).addEventListener("change", (e) => {
                    const v = Number(e.target.value);
                    if (Number.isFinite(v)) state.ranges[id] = v;
                    render();
                });
            });
            $("zeroList").addEventListener("click", listClick);
            $("poleList").addEventListener("click", listClick);
            $("zeroList").addEventListener("change", listChange);
            $("poleList").addEventListener("change", listChange);
            $("zeroList").addEventListener("focusin", listFocusIn);
            $("poleList").addEventListener("focusin", listFocusIn);
            $("zeroList").addEventListener("keydown", listKeyDown);
            $("poleList").addEventListener("keydown", listKeyDown);
            ["pointerdown", "mousedown", "mouseup", "click", "dblclick"].forEach((eventName) => {
                $("zeroList").addEventListener(eventName, stopInputPointerEvent);
                $("poleList").addEventListener(eventName, stopInputPointerEvent);
            });
            $("pzMap").addEventListener("pointerdown", pzPointerDown);
            $("pzMap").addEventListener("pointermove", pzPointerMove);
            window.addEventListener("pointerup", pzPointerUp);
        }

        function listClick(e) {
            if (e.target.closest(".entry-input")) return;
            const deleteBtn = e.target.closest(".delete-btn");
            const convertBtn = e.target.closest(".convert-btn");
            if (deleteBtn) {
                deleteEntry(deleteBtn.dataset.kind, deleteBtn.dataset.id);
                return;
            }
            if (convertBtn) {
                convertEntry(convertBtn.dataset.kind, convertBtn.dataset.id);
                return;
            }
            const card = e.target.closest(".entry-card");
            if (card) {
                const alreadySelected = state.selected
                    && state.selected.kind === card.dataset.kind
                    && state.selected.id === card.dataset.id;
                state.selected = alreadySelected ? null : { kind: card.dataset.kind, id: card.dataset.id };
                render();
            }
        }

        function listChange(e) {
            const input = e.target.closest(".entry-input");
            if (!input) return;
            updateEntryField(input.dataset.kind, input.dataset.id, input.dataset.field, input.value);
        }

        function listFocusIn(e) {
            const input = e.target.closest(".entry-input");
            if (!input) return;
            state.selected = { kind: input.dataset.kind, id: input.dataset.id };
        }

        function listKeyDown(e) {
            const input = e.target.closest(".entry-input");
            if (!input || e.key !== "Enter") return;
            e.preventDefault();
            updateEntryField(input.dataset.kind, input.dataset.id, input.dataset.field, input.value);
        }

        function stopInputPointerEvent(e) {
            if (!e.target.closest(".entry-input")) return;
            e.stopPropagation();
        }

        function pzPointerDown(e) {
            const marker = e.target.closest(".pz-marker");
            if (!marker) {
                state.selected = null;
                render();
                return;
            }
            e.preventDefault();
            state.selected = { kind: marker.dataset.kind, id: marker.dataset.id };
            state.pzDragMapper = state.pzLogScale ? null : pzMapper();
            state.drag = { kind: marker.dataset.kind, id: marker.dataset.id };
            $("pzMap").setPointerCapture(e.pointerId);
            render();
        }

        function pzPointerMove(e) {
            if (!state.drag) return;
            const list = state.drag.kind === "zero" ? state.zeros : state.poles;
            const entry = list.find((item) => item.id === state.drag.id);
            if (!entry) return;
            const pos = pointerToPz(e);
            entry.re = pos.re;
            entry.im = entry.im > EPS ? Math.abs(pos.im) : 0;
            render();
        }

        function pzPointerUp() {
            const shouldRefreshAxis = !!state.pzDragMapper;
            state.drag = null;
            state.pzDragMapper = null;
            if (shouldRefreshAxis) render();
        }

        bindEvents();
        resetExample();
    </script>
</body>
</html>
